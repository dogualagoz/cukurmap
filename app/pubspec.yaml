name: cukur_map
description: "Topluluk kaynaklı çukur ihbar ve haritalama uygulaması."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.0
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  uuid: ^4.5.1
  camera: ^0.11.0+2
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  flutter_map: ^7.0.2
  flutter_map_marker_cluster: ^1.4.0
  latlong2: ^0.9.1
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.3
  cached_network_image: ^3.4.1
  package_info_plus: ^8.1.2
  flutter_local_notifications: ^18.0.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#16150F"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"

flutter_native_splash:
  color: "#16150F"
  image: assets/icon/icon_foreground.png
  android_12:
    color: "#16150F"
    image: assets/icon/icon_foreground.png
